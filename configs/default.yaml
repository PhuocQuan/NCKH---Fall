detector:
  torso_fall_angle_deg: 62
  torso_upright_angle_deg: 35
  head_hip_height_ratio: 0.18
  hip_drop_velocity: 0.035
  angle_change_velocity_deg: 18
  min_fall_frames: 7
  warning_frames: 3
  alert_after_seconds: 10
  alert_on_long_lying_without_fall: false
  assumed_fps: 30
  cooldown_frames: 20
  profile: default

app:
  camera_width: 1280
  camera_height: 720
  draw_landmarks: true
  event_log_path: data/events.csv

ai:
  enabled: false
  model_path: models/fall_classifier.joblib
  alert_probability: 0.70
  smoothing_frames: 5
  decision_mode: display
  assist_min_frames: 5
